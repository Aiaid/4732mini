; PlatformIO project configuration for HiWin 4732 Pro / sunnygold 4732mini
; (Lilygo T-Display-S3, ESP32-S3 N16R8, SI4732/SI4735 receiver)
;
; The Arduino sketch lives at the repo root rather than under src/ to keep
; round-trip compatibility with the upstream sunnygold/zhang-chong layout.

[platformio]
src_dir = .

[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Sketch + Battery.cpp + Rotary.cpp all sit at the repo root.
; Match all .ino/.cpp/.c at root, and exclude vendored libs + metadata dirs.
build_src_filter = +<*.ino> +<*.cpp> +<*.c> -<libraries/> -<.git/> -<.pio/> -<.claude/>

; The vendored TFT_eSPI_DynamicSpeed (with the T-Display-S3 User_Setup baked in),
; PU2CLR_SI4735, etc. live under libraries/ and must be used in place of any
; PlatformIO-fetched copies — pin map and User_Setup.h are pre-tuned for this board.
lib_extra_dirs = libraries
lib_ldf_mode = chain+

; Match the Arduino IDE board settings noted in CLAUDE.md.
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ---------------------------------------------------------------------------
; Hardware probe env — flashes a tiny sketch that sweeps candidate GPIOs to
; identify the LCD backlight pin (and similar) on derivative boards (HiWin 4732
; Pro etc.) where the stock T-Display-S3 pin map doesn't drive the screen.
;
; Build & flash:    pio run -e probe -t upload
; Watch serial:     pio device monitor -e probe
; ---------------------------------------------------------------------------
[env:probe]
extends = env:lilygo-t-display-s3
build_src_filter = -<*> +<probe/*.ino> +<probe/*.cpp>
